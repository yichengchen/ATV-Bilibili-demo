syntax = "proto3";

package dm;

option java_package = "com.bilibili.tv.data.proto";
option java_outer_classname = "DmViewProto";

message DmSegConfig {
    int64 page_size = 1;
    int64 total = 2;
}

message DanmakuFlagConfig {
    int32 rec_flag = 1;
    string rec_text = 2;
    int32 rec_switch = 3;
}

message CommandDm {
    int64 id = 1;
    int64 oid = 2;
    int64 mid = 3;
    string command = 4;
    string content = 5;
    int32 progress = 6;
    string ctime = 7;
    string mtime = 8;
    string extra = 9;
    string id_str = 10;
}

message DmWebViewReply {
    int32 state = 1;
    string text = 2;
    string text_side = 3;
    DmSegConfig dm_sge = 4;
    DanmakuFlagConfig flag = 5;
    repeated string special_dms = 6;
    bool check_box = 7;
    int64 count = 8;
    repeated CommandDm command_dms = 9;
}
